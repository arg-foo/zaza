# Zaza Platform — Docker Compose
#
# Services:
#   zaza — Zaza MCP server (financial research tools)
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose ps             # Check status
#   docker compose down           # Stop all services

services:
  # ---- Zaza MCP Server ----
  zaza:
    build:
      context: .
      target: runtime
    ports:
      - "${ZAZA_MCP_PORT:-8100}:8100"
    volumes:
      - zaza-cache:/cache
      - ~/.zaza/trades:/trades
    environment:
      - ZAZA_TRADES_DIR=/trades
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('localhost', 8100), timeout=2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - default
      - tiger

networks:
  tiger:
    external: true
    name: tiger-brokers-cash-mcp_default

volumes:
  zaza-cache:
