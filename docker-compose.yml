# Zaza Platform — Docker Compose
#
# Services:
#   zaza     — Zaza MCP server (financial research tools)
#   consumer — Trade execution consumer (order lifecycle automation)
#
# Redis and Tiger MCP are managed externally (tiger-brokers-cash-mcp/).
# The consumer connects to them via REDIS_URL and TIGER_MCP_URL env vars.
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose ps                 # Check status
#   docker compose down               # Stop all services
#   docker compose logs consumer -f   # Follow consumer logs

services:
  # ---- Zaza MCP Server (streamable-http for consumer access) ----
  zaza:
    build:
      context: .
      target: runtime
    ports:
      - "${ZAZA_MCP_PORT:-8100}:8100"
    volumes:
      - zaza-cache:/cache
      - ~/.zaza/trades:/trades
    environment:
      - ZAZA_TRADES_DIR=/trades
    env_file: .env
    networks:
      - default
      - tiger

  # ---- Trade Execution Consumer ----
  consumer:
    build:
      context: ./consumer
    depends_on:
      zaza:
        condition: service_started
    env_file: .env
    environment:
      - ZAZA_MCP_URL=http://zaza:8100/mcp
      - TIGER_MCP_URL=http://tiger-mcp:8000/mcp
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    networks:
      - default
      - tiger

networks:
  tiger:
    external: true
    name: tiger-brokers-cash-mcp_default

volumes:
  zaza-cache:
